version: "3.9"

services:
  voice-agent:
    build: .
    container_name: voice-agent
    restart: unless-stopped
    network_mode: host  # so SIP/RTP UDP ports are reachable to/from the PBX
    env_file: .env
    volumes:
      - ./uploads:/var/voice-agent/uploads
      - ./logs:/var/log/voice-agent
    # No depends_on: MongoDB is MongoDB Atlas (set MONGO_URL in .env), and
    # embeddings live in Mongo too — there is no separate vector DB to run.
    # If you prefer a LOCAL MongoDB instead of Atlas, uncomment the `mongo`
    # service below and set MONGO_URL=mongodb://localhost:27017 in .env.

